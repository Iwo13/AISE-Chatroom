<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AISE Chatroom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Name entry screen ── */
    #name-screen {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    #name-screen h1 {
      font-size: 1.3rem;
      margin-bottom: 0.25rem;
      color: #1a1a2e;
    }

    #name-screen p {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    #name-screen input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #name-screen input:focus { border-color: #4f46e5; }

    #name-screen .error {
      color: #dc2626;
      font-size: 0.8rem;
      margin-top: 0.4rem;
      min-height: 1.1rem;
    }

    #name-screen button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #name-screen button:hover { background: #4338ca; }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 640px;
      height: 92vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    header {
      padding: 0.9rem 1.2rem;
      background: #4f46e5;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.05rem; font-weight: 600; }

    header .user-badge {
      font-size: 0.8rem;
      background: rgba(255,255,255,0.2);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
    }

    /* message list */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .empty-hint {
      text-align: center;
      color: #9ca3af;
      font-size: 0.875rem;
      margin: auto;
    }

    .msg {
      max-width: 78%;
      padding: 0.55rem 0.85rem;
      border-radius: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg.own {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.other {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111;
      border-bottom-left-radius: 3px;
    }

    .msg .meta {
      font-size: 0.72rem;
      margin-bottom: 0.2rem;
      opacity: 0.7;
    }

    .msg.own .meta { text-align: right; }

    /* input bar */
    #input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
    }

    #msg-input:focus { border-color: #4f46e5; }

    #send-btn {
      padding: 0.6rem 1.1rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #4338ca; }

    #char-count {
      font-size: 0.72rem;
      color: #9ca3af;
      text-align: right;
      padding: 0 1rem 0.4rem;
      flex-shrink: 0;
    }

    #char-count.warn { color: #dc2626; }
  </style>
</head>
<body>

  <!-- Screen 1: Name entry (REQ-F1.x) -->
  <div id="name-screen">
    <h1>AISE Chatroom</h1>
    <p>Gib deinen Namen ein, um dem Chat beizutreten.</p>
    <input type="text" id="name-input" placeholder="Dein Name" maxlength="50" autofocus>
    <div class="error" id="name-error"></div>
    <button id="join-btn">Beitreten</button>
  </div>

  <!-- Screen 2: Chat (REQ-F2.x, F3.x, F4.x) -->
  <div id="chat-screen">
    <header>
      <h1>AISE Chatroom</h1>
      <span class="user-badge" id="header-name"></span>
    </header>

    <div id="messages">
      <p class="empty-hint" id="empty-hint">Noch keine Nachrichten. Schreib die erste!</p>
    </div>

    <div id="char-count"><span id="char-num">0</span>/500</div>

    <div id="input-bar">
      <input
        type="text"
        id="msg-input"
        placeholder="Nachricht eingeben …"
        maxlength="500"
        autocomplete="off"
      >
      <button id="send-btn">Senden</button>
    </div>
  </div>

  <script>
    const MAX_LEN = 500;

    // ── helpers ──────────────────────────────────────────────
    function formatTime(date) {
      const pad = n => String(n).padStart(2, '0');
      return `${pad(date.getHours())}:${pad(date.getMinutes())} · ${pad(date.getDate())}.${pad(date.getMonth()+1)}.${date.getFullYear()}`;
    }

    function getMessages() {
      try { return JSON.parse(localStorage.getItem('aise_messages') || '[]'); }
      catch { return []; }
    }

    function saveMessages(msgs) {
      localStorage.setItem('aise_messages', JSON.stringify(msgs));
    }

    function getName() {
      return localStorage.getItem('aise_name') || '';
    }

    // ── render messages ──────────────────────────────────────
    function renderMessages() {
      const msgs = getMessages();
      const name = getName();
      const container = document.getElementById('messages');
      const hint = document.getElementById('empty-hint');

      // remove old messages (keep hint)
      [...container.querySelectorAll('.msg')].forEach(el => el.remove());

      if (msgs.length === 0) {
        hint.style.display = '';
        return;
      }
      hint.style.display = 'none';

      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.sender === name ? 'own' : 'other');
        div.innerHTML = `<div class="meta">${m.sender === name ? '' : m.sender + ' · '}${m.time}</div>${escapeHtml(m.text)}`;
        container.appendChild(div);
      });

      // REQ-F3.4: scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── name screen logic ────────────────────────────────────
    function showChat(name) {
      document.getElementById('name-screen').style.display = 'none';
      const cs = document.getElementById('chat-screen');
      cs.style.display = 'flex';
      document.getElementById('header-name').textContent = name;
      renderMessages();
      document.getElementById('msg-input').focus();
    }

    document.getElementById('join-btn').addEventListener('click', () => {
      const val = document.getElementById('name-input').value.trim();
      if (!val) {
        document.getElementById('name-error').textContent = 'Bitte gib einen Namen ein.';
        return;
      }
      localStorage.setItem('aise_name', val);
      showChat(val);
    });

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('join-btn').click();
    });

    // ── send message ─────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;                          // REQ-F2.4
      if (text.length > MAX_LEN) return;         // REQ-F2.6

      const msgs = getMessages();
      msgs.push({ sender: getName(), text, time: formatTime(new Date()) });
      saveMessages(msgs);
      input.value = '';                           // REQ-F2.3
      updateCharCount();
      renderMessages();
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }  // REQ-F2.2
    });

    // ── char counter ─────────────────────────────────────────
    function updateCharCount() {
      const len = document.getElementById('msg-input').value.length;
      const el = document.getElementById('char-num');
      el.textContent = len;
      el.parentElement.classList.toggle('warn', len > MAX_LEN - 50);
    }

    document.getElementById('msg-input').addEventListener('input', updateCharCount);

    // ── auto-refresh simulation (REQ-F4.1) ──────────────────
    setInterval(renderMessages, 5000);

    // ── init ────────────────────────────────────────────────
    const stored = getName();
    if (stored) {
      showChat(stored);
    }
  </script>
</body>
</html>
